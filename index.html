<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Patrimo — Gestão Financeira</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Patrimo" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
</head>
<body>
  <div id="app">
    <!-- App bar -->
    <header class="appbar" id="appbar">
      <div class="appbar-left">
        <div class="logo">
          <span class="logo-mark"></span>
          <span class="logo-text">Patrimo</span>
        </div>
      </div>
      <div class="appbar-right">
        <button class="icon-btn" id="btnHideValues" title="Ocultar valores" aria-label="Ocultar valores">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 11a4 4 0 110-8 4 4 0 010 8z" fill="currentColor"/></svg>
        </button>
        <button class="icon-btn" id="btnSettings" title="Backup e ajustes" aria-label="Backup e ajustes">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M12 8a4 4 0 100 8 4 4 0 000-8zm8.94 4a7 7 0 00-.13-1.32l2.06-1.6-2-3.46-2.43 1a7 7 0 00-2.29-1.32L15.5 2h-7l-.65 2.98A7 7 0 005.56 6.3l-2.43-1-2 3.46 2.06 1.6A7 7 0 003.06 12c0 .45.05.89.13 1.32l-2.06 1.6 2 3.46 2.43-1a7 7 0 002.29 1.32L8.5 22h7l.65-2.98a7 7 0 002.29-1.32l2.43 1 2-3.46-2.06-1.6c.08-.43.13-.87.13-1.32z" fill="currentColor"/></svg>
        </button>
      </div>
    </header>

    <!-- Screens render here -->
    <main id="view" class="view"></main>

    <!-- Bottom navigation -->
    <nav class="bottomnav" id="bottomnav">
      <button class="nav-item active" data-route="dashboard">
        <svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8v9a2 2 0 01-2 2h-4v-6H9v6H5a2 2 0 01-2-2z" fill="currentColor"/></svg>
        <span>Início</span>
      </button>
      <button class="nav-item" data-route="invest">
        <svg viewBox="0 0 24 24"><path d="M4 19h16v2H4zM6 10h3v7H6zm5-5h3v12h-3zm5 8h3v4h-3z" fill="currentColor"/></svg>
        <span>Investir</span>
      </button>
      <button class="nav-fab" id="navFab" aria-label="Adicionar">
        <svg viewBox="0 0 24 24"><path d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2z" fill="currentColor"/></svg>
      </button>
      <button class="nav-item" data-route="cashflow">
        <svg viewBox="0 0 24 24"><path d="M7 7h10l-3-3 1.4-1.4L20.8 7 15.4 12.4 14 11l3-3H7zm10 10H7l3 3-1.4 1.4L3.2 17l5.4-5.4L10 13l-3 3z" fill="currentColor"/></svg>
        <span>Fluxo</span>
      </button>
      <button class="nav-item" data-route="reports">
        <svg viewBox="0 0 24 24"><path d="M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2zm3 12h2v3H8zm4-6h2v9h-2zm4 3h2v6h-2z" fill="currentColor"/></svg>
        <span>Relatórios</span>
      </button>
    </nav>
  </div>

  <!-- Capa / intro animada -->
  <div id="intro-root"></div>

  <!-- Auth gate (login / cadastro) -->
  <div id="auth-root"></div>

  <!-- Modal / Sheet container -->
  <div id="sheet-root"></div>
  <div id="toast-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/store.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/reminders.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/intro.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/screens.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch((err) => console.warn('SW falhou:', err));
      });
    }
  </script>
</body>
</html>
